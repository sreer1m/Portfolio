<body>
    <div class="container">

        </div>

        <div class="card">
            <h2>Check Your Understanding</h2>
            <p>Select the best answer for the question below:</p>
        </div>

        <div id="quiz"></div>
        <div id="navigation"></div>
    </div>

    <script>
        window.quizData = {
            question: "You inspect an element and see three CSS rules setting 'color'. One says 'color: blue' (from a class), one says 'color: green' (from an ID), and one says 'color: red' (inline style). The text appears red. Why?",
            options: [
                "Red was defined last in the CSS file",
                "Inline styles (element.style) have the highest priority and override everything else",
                "The browser chose red randomly",
                "IDs always override classes, and red is from an ID"
            ],
            correctAnswer: 1,
            explanation: "Correct! Inline styles (style='color: red') have the HIGHEST specificity and will override any other CSS rules, including ID selectors and class selectors. This is why you'll often see inline styles at the very top of the Styles panel in DevTools—they take precedence over everything else."
        };
    </script>
