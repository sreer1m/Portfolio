<body>

        <div id="quiz"></div>

    </div>

    <script>
        window.quizData = {
            question: "You inspect an element and see this code: <div class='container'><p>Hello</p></div>. What is the relationship between the <div> and <p> elements?",
            options: [
                "The <div> and <p> are siblings (at the same level)",
                "The <p> is the parent and <div> is the child",
                "The <div> is the parent and <p> is the child",
                "They are completely unrelated elements"
            ],
            correctAnswer: 2,
            explanation: "Correct! The <div> is the PARENT element and the <p> is the CHILD element because the <p> is nested inside the <div>. This is like a folder (div) containing a file (p). Understanding parent-child relationships is crucial for navigating the DOM tree in DevTools."
        };
    </script>
